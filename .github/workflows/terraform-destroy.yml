name: Terraform Destroy

# ⚠️  DESTRUCTIVE — tears down ALL infrastructure.
# Manual trigger only. You must type "destroy" in the confirmation input.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm you want to tear down all infrastructure'
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # enables GitHub OIDC JWT for Bella manager token exchange

jobs:
  guard:
    name: Confirm destroy
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "destroy" ]; then
            echo "::error::Confirmation failed. You must type exactly 'destroy' to proceed."
            echo "You typed: '${{ inputs.confirm }}'"
            exit 1
          fi
          echo "✅ Confirmation accepted — proceeding with destroy."

  destroy:
    name: terraform destroy
    runs-on: ubuntu-latest
    needs: guard

    environment: production

    env:
      TF_IN_AUTOMATION: true
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION:            ${{ vars.AWS_REGION || 'us-east-1' }}

      TF_VAR_bella_baxter_url:    ${{ vars.BELLA_BAXTER_URL }}
      TF_VAR_dokploy_admin_email: ${{ vars.DOKPLOY_ADMIN_EMAIL }}
      TF_VAR_aws_region:          ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_VAR_project_name:        ${{ vars.PROJECT_NAME || 'lmns' }}
      TF_VAR_app_name:            ${{ vars.APP_NAME || 'look-ma-no-secrets-demo' }}
      TF_VAR_ami_id:              ${{ vars.AMI_ID || 'ami-0905a3c97561e0b69' }}

      # Note: BELLA_API_KEY is NOT stored — obtained dynamically via OIDC exchange (see step below)
      BELLA_BAXTER_PRIVATE_KEY:        ${{ secrets.BELLA_CI_PRIVATE_KEY }}
      TF_VAR_bella_app_api_key:        ${{ secrets.BELLA_APP_API_KEY }}
      TF_VAR_bella_app_private_key:    ${{ secrets.BELLA_APP_PRIVATE_KEY }}
      TF_VAR_bella_provider_slug:     ${{ vars.BELLA_PROVIDER_SLUG }}
      TF_VAR_dokploy_admin_password:  ${{ secrets.DOKPLOY_ADMIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: Cosmic-Chimps/bella-baxter-setup-action@v1
        with:
          bella-url: ${{ vars.BELLA_BAXTER_URL }}
          oidc: 'true'

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}"

      - name: Terraform Destroy
        working-directory: terraform
        run: terraform destroy -auto-approve -no-color

  notify:
    runs-on: ubuntu-latest
    needs: [destroy]
    if: always()
    steps:
      - uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            text: "${{ needs.destroy.result == 'success' && '✅' || '❌' }} *look-ma-no-secrets terraform DESTROY* by @${{ github.actor }}: ${{ needs.destroy.result }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
